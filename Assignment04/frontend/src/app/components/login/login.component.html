<div class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8 bg-gradient-to-br from-blue-50 via-slate-50 to-indigo-100">
  <div class="max-w-md w-full backdrop-blur-sm bg-white/90 p-8 rounded-3xl shadow-2xl ring-1 ring-slate-900/5 transition-all duration-300 hover:shadow-blue-200/50">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4 text-blue-600 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h2>
      <p class="mt-2 text-sm text-slate-500">Please sign in to your account</p>
    </div>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
      <div>
        <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
        <div class="mt-2">
          <input 
            id="username" 
            name="username" 
            type="text" 
            [(ngModel)]="credentials.username" 
            required 
            class="block w-full px-4 py-3 rounded-xl border-0 py-1.5 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 transition-colors"
            placeholder="Enter your username">
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
        <div class="mt-2">
          <input 
            id="password" 
            name="password" 
            type="password" 
            [(ngModel)]="credentials.password" 
            required 
            class="block w-full px-4 py-3 rounded-xl border-0 py-1.5 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 transition-colors"
            placeholder="Enter your password">
        </div>
      </div>

      <div *ngIf="error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        {{ error }}
      </div>

      <div>
        <button 
          type="submit" 
          [disabled]="!loginForm.valid"
          class="flex w-full justify-center rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-md hover:from-blue-500 hover:to-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all active:scale-[0.98]">
          Sign in
        </button>
      </div>
      
      <p class="text-center text-sm text-slate-500">
        Don't have an account? 
        <a routerLink="/register" class="font-semibold text-blue-600 hover:text-blue-500 transition-colors">Register here</a>
      </p>
    </form>
  </div>
</div>
