<div class="container animate-fade-in">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h2 class="page-title">Manage Students</h2>
    <button class="btn-primary" style="width: auto; padding: 10px 24px;" (click)="openForm()">+ Add Student</button>
  </div>

  <div class="glass-card table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Department</th>
          <th>DOB</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let student of students">
          <td>{{ student.id }}</td>
          <td>{{ student.first_name }} {{ student.last_name }}</td>
          <td>{{ student.email }}</td>
          <td>{{ student.department_name }}</td>
          <td>{{ student.dob | date }}</td>
          <td>
            <button class="btn-success" style="margin-right: 0.5rem;" (click)="openForm(student)">Edit</button>
            <button class="btn-danger" (click)="delete(student.id)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="students.length === 0">
          <td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-secondary);">No students found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Form Modal Overlay -->
  <div class="modal-overlay" *ngIf="showForm">
    <div class="glass-card modal-content animate-fade-in">
      <h3>{{ isEditing ? 'Edit Student' : 'Add New Student' }}</h3>
      <form (ngSubmit)="save()">
        <div class="form-group">
          <label>First Name</label>
          <input [(ngModel)]="studentModel.first_name" name="firstName" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input [(ngModel)]="studentModel.last_name" name="lastName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="studentModel.email" name="email" required>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select [(ngModel)]="studentModel.department_id" name="department" required>
            <option [ngValue]="null" disabled>Select Department</option>
            <option *ngFor="let dept of departments" [value]="dept.id">{{ dept.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" [(ngModel)]="studentModel.dob" name="dob">
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" class="btn-danger" (click)="closeForm()" style="width: auto;">Cancel</button>
          <button type="submit" class="btn-primary" style="width: auto;">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
