<div class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8 bg-gradient-to-br from-emerald-50 via-slate-50 to-teal-100">
  <div class="max-w-md w-full backdrop-blur-sm bg-white/90 p-8 rounded-3xl shadow-2xl ring-1 ring-slate-900/5 transition-all duration-300 hover:shadow-emerald-200/50">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 mb-4 text-emerald-600 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create Account</h2>
      <p class="mt-2 text-sm text-slate-500">Join us and start learning today</p>
    </div>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="space-y-6">
      <div>
        <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
        <div class="mt-2">
          <input 
            id="username" 
            name="username" 
            type="text" 
            [(ngModel)]="user.username" 
            required 
            class="block w-full px-4 py-3 rounded-xl border-0 py-1.5 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-emerald-600 sm:text-sm sm:leading-6 transition-colors"
            placeholder="Choose username">
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
        <div class="mt-2">
          <input 
            id="password" 
            name="password" 
            type="password" 
            [(ngModel)]="user.password" 
            required 
            minlength="4"
            class="block w-full px-4 py-3 rounded-xl border-0 py-1.5 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-emerald-600 sm:text-sm sm:leading-6 transition-colors"
            placeholder="Choose password">
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-3">I am a:</label>
        <div class="grid grid-cols-2 gap-4">
          <label class="relative flex cursor-pointer rounded-xl border bg-white p-4 shadow-sm focus:outline-none ring-1 has-[:checked]:ring-2 has-[:checked]:ring-emerald-600 has-[:checked]:border-emerald-600 hover:border-emerald-300 transition-all">
            <input type="radio" name="role" value="student" [(ngModel)]="user.role" class="sr-only">
            <span class="flex flex-1 items-center justify-center">
              <span class="flex flex-col text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-6 w-6 text-slate-400 mb-2 has-[:checked]:text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                </svg>
                <span class="block text-sm font-medium text-slate-900">Student</span>
              </span>
            </span>
            <span class="pointer-events-none absolute -inset-px rounded-xl border-2 border-transparent" aria-hidden="true"></span>
          </label>
          <label class="relative flex cursor-pointer rounded-xl border bg-white p-4 shadow-sm focus:outline-none ring-1 has-[:checked]:ring-2 has-[:checked]:ring-emerald-600 has-[:checked]:border-emerald-600 hover:border-emerald-300 transition-all">
            <input type="radio" name="role" value="teacher" [(ngModel)]="user.role" class="sr-only">
            <span class="flex flex-1 items-center justify-center">
              <span class="flex flex-col text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-6 w-6 text-slate-400 mb-2 has-[:checked]:text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                <span class="block text-sm font-medium text-slate-900">Teacher</span>
              </span>
            </span>
            <span class="pointer-events-none absolute -inset-px rounded-xl border-2 border-transparent" aria-hidden="true"></span>
          </label>
        </div>
      </div>

      <div *ngIf="error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        {{ error }}
      </div>

      <div>
        <button 
          type="submit" 
          [disabled]="!registerForm.valid"
          class="flex w-full justify-center rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 px-4 py-3 text-sm font-semibold text-white shadow-md hover:from-emerald-400 hover:to-teal-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all active:scale-[0.98]">
          Register Account
        </button>
      </div>
      
      <p class="text-center text-sm text-slate-500">
        Already have an account? 
        <a routerLink="/login" class="font-semibold text-emerald-600 hover:text-emerald-500 transition-colors">Login here</a>
      </p>
    </form>
  </div>
</div>
