version: '3.8'

services:
  cassandra-node1:
    image: cassandra:latest
    container_name: cassandra-node1
    hostname: cassandra-node1
    environment:
      - CASSANDRA_CLUSTER_NAME=2026GRP01
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=Rack1
      - CASSANDRA_SEEDS=cassandra-node1
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "[ $$(nodetool statusgossip) = running ]"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cassandra-cluster

  cassandra-node2:
    image: cassandra:latest
    container_name: cassandra-node2
    hostname: cassandra-node2
    environment:
      - CASSANDRA_CLUSTER_NAME=2026GRP01
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=Rack1
      - CASSANDRA_SEEDS=cassandra-node1
    ports:
      - "9043:9042"
    depends_on:
      cassandra-node1:
        condition: service_healthy
    networks:
      - cassandra-cluster

  cassandra-node3:
    image: cassandra:latest
    container_name: cassandra-node3
    hostname: cassandra-node3
    environment:
      - CASSANDRA_CLUSTER_NAME=2026GRP01
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=Rack1
      - CASSANDRA_SEEDS=cassandra-node1
    ports:
      - "9044:9042"
    depends_on:
      cassandra-node1:
        condition: service_healthy
    networks:
      - cassandra-cluster

networks:
  cassandra-cluster:
    name: cassandra-cluster
