<div class="min-h-screen bg-slate-50 py-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="mb-8 flex items-center justify-between">
      <div>
        <a routerLink="/dashboard" class="inline-flex items-center text-sm font-medium text-indigo-600 hover:text-indigo-500 mb-2 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back to Dashboard
        </a>
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Manage Questions <span class="text-slate-400 font-normal">#{{ examId }}</span></h2>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Form -->
      <div class="lg:col-span-5">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sticky top-8">
          <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
            </div>
            Add New Question
          </h3>
          <form (ngSubmit)="onSubmit()" class="space-y-6">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">Question Text</label>
              <textarea [(ngModel)]="newQuestion.question_text" name="text" required rows="3" class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 transition-colors" placeholder="e.g. What is the capital of France?"></textarea>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">Image URL <span class="text-slate-400 font-normal">(Optional)</span></label>
              <input type="text" [(ngModel)]="newQuestion.image_url" name="image" class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 transition-colors" placeholder="https://example.com/image.png">
            </div>

            <div class="space-y-4 pt-2 border-t border-slate-100">
              <label class="block text-sm font-semibold text-slate-700">Options <span class="text-slate-400 font-normal">(Select correct answer)</span></label>
              <div *ngFor="let opt of newQuestion.options; let i = index" class="flex items-center gap-3 bg-slate-50 p-2 rounded-lg border border-slate-200 focus-within:ring-2 focus-within:ring-indigo-600 focus-within:border-indigo-600 transition-all">
                <div class="flex items-center justify-center w-8 h-8 rounded-md bg-white border border-slate-200 font-bold text-slate-700 text-sm shadow-sm">{{ opt.id }}</div>
                <input type="text" [(ngModel)]="opt.text" name="opt-{{i}}" required class="block w-full rounded-md border-0 py-1.5 px-3 text-slate-900 shadow-none ring-0 placeholder:text-slate-400 focus:ring-0 sm:text-sm sm:leading-6 bg-transparent" placeholder="Option text">
                <input type="radio" name="correct" [value]="opt.id" [(ngModel)]="newQuestion.correct_option" class="h-5 w-5 border-slate-300 text-indigo-600 focus:ring-indigo-600 cursor-pointer">
              </div>
            </div>

            <button type="submit" class="flex w-full justify-center rounded-xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-md hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-all active:scale-[0.98]">
              Add Question
            </button>
          </form>
        </div>
      </div>

      <!-- List -->
      <div class="lg:col-span-7">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="px-6 py-5 border-b border-slate-200 bg-slate-50/50 flex justify-between items-center">
             <h3 class="text-lg font-bold text-slate-900">Questions <span class="ml-2 inline-flex items-center rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-semibold text-slate-800">{{ questions.length }}</span></h3>
          </div>
          
          <div class="divide-y divide-slate-100">
            <div *ngFor="let q of questions; let idx = index" class="p-6 hover:bg-slate-50 transition-colors">
              <div class="flex gap-4">
                <div class="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-full bg-indigo-100 text-indigo-700 font-bold text-lg">
                  {{ idx + 1 }}
                </div>
                <div class="flex-1">
                  <p class="text-base font-medium text-slate-900 mb-3">{{ q.question_text }}</p>
                  <img *ngIf="q.image_url" [src]="q.image_url" class="max-w-full rounded-lg border border-slate-200 shadow-sm mb-4 object-cover max-h-48">
                  
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div *ngFor="let opt of q.options" 
                         class="flex items-center gap-3 p-3 rounded-lg border transition-all"
                         [ngClass]="opt.id === q.correct_option ? 'bg-green-50 border-green-200 shadow-sm' : 'bg-white border-slate-200'">
                      <div class="w-6 h-6 rounded flex justify-center items-center text-xs font-bold"
                           [ngClass]="opt.id === q.correct_option ? 'bg-green-200 text-green-800' : 'bg-slate-100 text-slate-600'">
                        {{ opt.id }}
                      </div>
                      <span class="text-sm flex-1" [ngClass]="opt.id === q.correct_option ? 'text-green-900 font-medium' : 'text-slate-700'">{{ opt.text }}</span>
                      <svg *ngIf="opt.id === q.correct_option" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-600" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                      </svg>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div *ngIf="questions.length === 0" class="py-16 text-center">
             <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
             </svg>
             <h3 class="mt-2 text-sm font-semibold text-slate-900">No questions yet</h3>
             <p class="mt-1 text-sm text-slate-500">Start adding questions to this exam using the form.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
