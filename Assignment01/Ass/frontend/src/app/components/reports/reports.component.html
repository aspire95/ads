<div class="container animate-fade-in">
  <h2 class="page-title">Generate Reports</h2>
  
  <div class="glass-card" style="margin-bottom: 2rem; display: flex; gap: 1rem; align-items: flex-end;">
    <div style="flex: 1;">
      <label>Select Table</label>
      <select [(ngModel)]="selectedTable" style="margin-bottom: 0;">
        <option *ngFor="let table of tables" [value]="table">{{ table | titlecase }}</option>
      </select>
    </div>
    <button class="btn-primary" style="width: auto; padding: 12px 24px;" (click)="generateReport()" [disabled]="loading">
      {{ loading ? 'Generating...' : 'Generate Report' }}
    </button>
  </div>

  <div class="glass-card table-container" *ngIf="reportData.length > 0">
    <table>
      <thead>
        <tr>
          <th *ngFor="let header of headers">{{ header }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of reportData">
          <td *ngFor="let header of headers">{{ row[header] }}</td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <div *ngIf="reportData.length === 0 && !loading" style="text-align: center; color: var(--text-secondary); margin-top: 2rem;">
    No data to display or report not generated yet.
  </div>
</div>
